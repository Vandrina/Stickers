<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Washi & Tab Sticker Sheet — 2 Pages</title>
<style>

  @page {
    size: letter;
    margin: 0;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #e8e8e8;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  @media print {
    body {
      background: white;
      padding: 0;
      gap: 0;
    }
    .page-gap { display: none; }
  }

  /* ── PAGE SHELL ──────────────────────────────────────── */

  .page {
    width: 215.9mm;
    height: 279.4mm;
    background: white;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(0,0,0,0.18);
  }

  @media print {
    .page {
      box-shadow: none;
      page-break-after: always;
    }
    .page:last-child {
      page-break-after: avoid;
    }
  }

  /* ── PAGE OUTLINE (cut guide) ───────────────────────── */

  .cut-border {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border: 0.5pt solid #bbb;
    pointer-events: none;
    z-index: 5;
  }

  /* ── PAGE HEADER ─────────────────────────────────────── */

  .page-header {
    position: absolute;
    top: 5mm;
    left: 12mm;
    right: 12mm;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 5pt;
    letter-spacing: 0.8pt;
    text-transform: uppercase;
    color: #bbb;
  }

  /* ── PAGE FOOTER ─────────────────────────────────────── */

  .page-footer {
    position: absolute;
    bottom: 5mm;
    left: 12mm;
    right: 12mm;
    display: flex;
    justify-content: center;
    font-size: 4.5pt;
    letter-spacing: 0.7pt;
    text-transform: uppercase;
    color: #bbb;
  }

  /* ── CONTENT AREA ────────────────────────────────────── */

  .content {
    position: absolute;
    top: 12mm;
    left: 12mm;
    right: 12mm;
    /* washi is 210mm, sit it from top margin */
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 8mm;
  }

  /* ── WASHI STRIPS ────────────────────────────────────── */

  .washi-section {
    display: flex;
    flex-direction: row;
    gap: 3mm;
    flex-shrink: 0;
  }

  .washi-strip {
    width: 15mm;
    height: 210mm;
    border: 0.45pt solid #c0c0c0;
    position: relative;
    overflow: hidden;
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 3.5mm,
        rgba(185,185,185,0.14) 3.5mm,
        rgba(185,185,185,0.14) 4mm
      );
  }

  /* rotated dimension label */
  .washi-strip::after {
    content: '15 mm';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translateX(-50%) translateY(-50%) rotate(-90deg);
    font-size: 4pt;
    letter-spacing: 0.5pt;
    color: #d0d0d0;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* top and bottom tick marks */
  .washi-strip::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0;
    border-top: 0.4pt solid #d0d0d0;
  }

  /* ── TABS SECTION ────────────────────────────────────── */

  .tabs-section {
    display: flex;
    flex-direction: column;
    gap: 3mm;
    flex-shrink: 0;
  }

  .tab-row {
    display: flex;
    flex-direction: row;
    gap: 3mm;
  }

  .tab {
    width: 30mm;
    height: 30mm;
    border: 0.45pt solid #c0c0c0;
    position: relative;
    overflow: hidden;
  }

  /* ── FOLD SCORE LINE ─────────────────────────────────── */

  .fold-line {
    position: absolute;
    left: 0;
    right: 0;
    top: 15mm;
    border-top: 0.75pt dashed #888;
    pointer-events: none;
  }

  /* tick marks at the edge of fold line */
  .fold-line::before,
  .fold-line::after {
    content: '';
    position: absolute;
    top: -1.2mm;
    width: 0;
    height: 2.4mm;
    border-left: 0.4pt solid #aaa;
  }
  .fold-line::before { left: 0; }
  .fold-line::after  { right: 0; }

  /* ── FOLD LABEL (first tab only) ─────────────────────── */

  .fold-label {
    position: absolute;
    left: 1.5mm;
    top: calc(15mm + 1mm);
    font-size: 3.8pt;
    letter-spacing: 0.4pt;
    color: #ccc;
    text-transform: uppercase;
  }

  /* ── GUIDE TINT on first tab ─────────────────────────── */

  .tab.guide {
    background: linear-gradient(
      to bottom,
      rgba(215,215,215,0.2) 0,
      rgba(215,215,215,0.2) 15mm,
      transparent 15mm
    );
  }

  /* ── CROP / CORNER MARKS ─────────────────────────────── */

  .corner {
    position: absolute;
    width: 4mm;
    height: 4mm;
    pointer-events: none;
    z-index: 10;
  }
  .corner-tl { top: 8mm;    left: 8mm;    border-top: 0.4pt solid #aaa;    border-left: 0.4pt solid #aaa; }
  .corner-tr { top: 8mm;    right: 8mm;   border-top: 0.4pt solid #aaa;    border-right: 0.4pt solid #aaa; }
  .corner-bl { bottom: 8mm; left: 8mm;    border-bottom: 0.4pt solid #aaa; border-left: 0.4pt solid #aaa; }
  .corner-br { bottom: 8mm; right: 8mm;   border-bottom: 0.4pt solid #aaa; border-right: 0.4pt solid #aaa; }

  /* ── SCREEN ONLY: page label ─────────────────────────── */

  .screen-label {
    font-size: 10px;
    color: #999;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  @media print { .screen-label { display: none; } }

</style>
</head>
<body>

  <div class="screen-label">Page 1 of 2 — letter / print at 100% / no margins</div>

  <!-- ══════════ PAGE 1 ══════════ -->
  <div class="page" id="page1">
    <div class="cut-border"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="page-header">
      <span>washi &amp; fold tab sheet</span>
      <span>1 / 2</span>
    </div>

    <div class="content">
      <div class="washi-section" id="washi1"></div>
      <div class="tabs-section" id="tabs1"></div>
    </div>

    <div class="page-footer">
      3 washi strips · 15 × 210 mm &emsp;|&emsp; 6 fold tabs · 30 mm · score @ 15 mm
    </div>
  </div>

  <div class="screen-label">Page 2 of 2 — letter / print at 100% / no margins</div>

  <!-- ══════════ PAGE 2 ══════════ -->
  <div class="page" id="page2">
    <div class="cut-border"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="page-header">
      <span>washi &amp; fold tab sheet</span>
      <span>2 / 2</span>
    </div>

    <div class="content">
      <div class="washi-section" id="washi2"></div>
      <div class="tabs-section" id="tabs2"></div>
    </div>

    <div class="page-footer">
      3 washi strips · 15 × 210 mm &emsp;|&emsp; 6 fold tabs · 30 mm · score @ 15 mm
    </div>
  </div>

<script>
  function buildWashi(id, count) {
    const sec = document.getElementById(id);
    for (let i = 0; i < count; i++) {
      const strip = document.createElement('div');
      strip.className = 'washi-strip';
      sec.appendChild(strip);
    }
  }

  function buildTabs(id, rows, cols) {
    const sec = document.getElementById(id);
    let first = true;
    for (let r = 0; r < rows; r++) {
      const row = document.createElement('div');
      row.className = 'tab-row';
      for (let c = 0; c < cols; c++) {
        const tab = document.createElement('div');
        tab.className = 'tab';
        if (first) {
          tab.classList.add('guide');
          const lbl = document.createElement('span');
          lbl.className = 'fold-label';
          lbl.textContent = 'fold';
          tab.appendChild(lbl);
          first = false;
        }
        const fold = document.createElement('div');
        fold.className = 'fold-line';
        tab.appendChild(fold);
        row.appendChild(tab);
      }
      sec.appendChild(row);
    }
  }

  // 3 strips + 2 rows × 3 cols = 6 tabs per page
  buildWashi('washi1', 3);
  buildTabs('tabs1', 2, 3);
  buildWashi('washi2', 3);
  buildTabs('tabs2', 2, 3);
</script>

</body>
</html>
