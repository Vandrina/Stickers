<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Sheets Index</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f7f7f7;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    a.card {
      display: block;
      padding: 16px;
      background: white;
      border-radius: 10px;
      text-decoration: none;
      color: black;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: transform 0.1s ease;
    }

    a.card:hover {
      transform: translateY(-2px);
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <h1>Sticker Sheet Index</h1>

  <div class="grid">

    <a class="card" href="sheets/b5-on-washi/">
      <div class="title">B5 on Washi</div>
      <div class="meta">Preview version</div>
    </a>

    <a class="card" href="sheets/b5-on-washi/print.html">
      <div class="title">B5 on Washi (Print)</div>
      <div class="meta">Print-ready layout</div>
    </a>

  </div>

</body>
</html>
